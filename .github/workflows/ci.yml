name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Swift tests
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Run tests
        run: swift test

  linux:
    name: Linux build (CLI + portable tests)
    runs-on: ubuntu-latest
    container: swift:5.9

    steps:
      - uses: actions/checkout@v4

      - name: Build whatcable-cli
        run: swift build --product whatcable-cli

      - name: Run portable tests
        run: swift test --filter '^WhatCableCoreTests\.'

  lint-scripts:
    name: Shell script syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check shell scripts
        run: bash -n scripts/build-app.sh scripts/release.sh
